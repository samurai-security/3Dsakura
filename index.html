<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かつしか散策マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Hiragino Sans', 'Meiryo', sans-serif; }
.area-scroll {
  display: flex; gap: 6px; padding: 8px 10px;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  background: #fff; border-bottom: 1px solid #e0e0e0;
  scrollbar-width: none;
}
.area-scroll::-webkit-scrollbar { display: none; }
.area-btn {
  flex-shrink: 0; padding: 7px 16px; border-radius: 20px;
  border: 1px solid #bbb; background: #fff; color: #555;
  font-size: 13px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.area-btn:hover { background: #f0f0f0; }
.area-btn.active { background: #333; color: #fff; border-color: #333; }
/* 現在地ボタン */
.loc-btn {
  background: #f0f7ff; border-color: #2266CC; color: #2266CC; font-weight: 600;
}
.loc-btn:hover { background: #dceaff; }
.loc-btn:disabled { opacity: 0.55; cursor: wait; }

#map { width: 100%; height: calc(100vh - 52px); }
.spot-popup { font-family: -apple-system, 'Hiragino Sans', sans-serif; min-width: 180px; }
.spot-popup h3 { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 4px; }
.spot-popup p { font-size: 12px; color: #666; line-height: 1.5; margin: 0; }
.spot-popup .area-tag {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 10px; background: #f0f0f0; color: #555; margin-top: 6px;
}
/* redピンのポップアップを少し目立たせる */
.leaflet-popup.red-popup .leaflet-popup-content-wrapper {
  border: 2px solid #D42A2A;
  box-shadow: 0 3px 14px rgba(212, 42, 42, 0.25);
}
/* 現在地マーカーのパルスアニメーション */
.loc-pulse {
  width: 16px; height: 16px; border-radius: 50%;
  background: #1E88E5; border: 3px solid #fff;
  box-shadow: 0 0 0 0 rgba(30, 136, 229, 0.5);
  animation: locPulse 1.8s infinite;
}
@keyframes locPulse {
  0%   { box-shadow: 0 0 0 0 rgba(30, 136, 229, 0.5); }
  70%  { box-shadow: 0 0 0 14px rgba(30, 136, 229, 0); }
  100% { box-shadow: 0 0 0 0 rgba(30, 136, 229, 0); }
}
</style>
</head>
<body>
<div class="area-scroll" id="areaBtns"></div>
<div id="map"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
// ============================================================
// ★ Googleスプレッドシートの公開URL（CSV）を貼り付けてください
// ============================================================
var SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRKcb2FDhdLxpslway8nkm8BcGeVP1EJVJwokIvXN6bGD_uwvgWERsPcjGD8kP5vcdTzyaI_C0U3XA1/pub?gid=0&single=true&output=csv";

// ============================================================
// 列構成（1行目ヘッダー必須）:
// name / lat / lng / area / color / description
// color: red / blue / purple / black / white
//   - red のみ大サイズ＋ポップアップ常時表示
// ============================================================

var PIN_COLORS = {
  red:    "#D42A2A",
  blue:   "#2266CC",
  purple: "#8B3FBF",
  black:  "#333333",
  white:  "#FFFFFF"
};

function makeIcon(color) {
  var c = (color || "black").trim().toLowerCase();
  var hex = PIN_COLORS[c] || PIN_COLORS.black;
  var isRed = (c === "red");
  var isWhite = (c === "white");

  // redのみ拡大
  var w = isRed ? 36 : 25;
  var h = isRed ? 59 : 41;

  // white は視認性のため縁取り＋中心ドット濃色化
  var stroke = isWhite ? "#333" : "none";
  var strokeW = isWhite ? 1.5 : 0;
  var dot = isWhite ? "#333" : "#fff";

  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="' + w + '" height="' + h + '" viewBox="0 0 25 41">'
    + '<path d="M12.5 0C5.6 0 0 5.6 0 12.5C0 21.9 12.5 41 12.5 41S25 21.9 25 12.5C25 5.6 19.4 0 12.5 0Z" fill="' + hex + '" stroke="' + stroke + '" stroke-width="' + strokeW + '"/>'
    + '<circle cx="12.5" cy="12.5" r="5" fill="' + dot + '"/></svg>';

  return L.divIcon({
    html: svg,
    iconSize: [w, h],
    iconAnchor: [Math.round(w / 2), h],
    popupAnchor: [0, -h + 6],
    className: ""
  });
}

var areas = [
  { name: "全エリア", lat: 35.7480, lng: 139.8530, zoom: 13 },
  { name: "柴又", lat: 35.7583, lng: 139.8770, zoom: 16 },
  { name: "高砂・鎌倉", lat: 35.7530, lng: 139.8700, zoom: 16 },
  { name: "金町・水元", lat: 35.7720, lng: 139.8710, zoom: 15 },
  { name: "亀有", lat: 35.7625, lng: 139.8490, zoom: 16 },
  { name: "青戸", lat: 35.7510, lng: 139.8555, zoom: 16 },
  { name: "立石", lat: 35.7415, lng: 139.8507, zoom: 16 },
  { name: "お花茶屋", lat: 35.7430, lng: 139.8370, zoom: 16 },
  { name: "堀切", lat: 35.7450, lng: 139.8080, zoom: 16 },
  { name: "四つ木", lat: 35.7320, lng: 139.8230, zoom: 16 },
  { name: "新小岩", lat: 35.7170, lng: 139.8520, zoom: 16 }
];

var map = L.map("map", { closePopupOnClick: false }).setView([areas[0].lat, areas[0].lng], areas[0].zoom);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors", maxZoom: 19
}).addTo(map);

var allMarkers = [];
var container = document.getElementById("areaBtns");

// ----------------------------------------------------------------
// 現在地ボタン（エリアボタンの先頭に固定配置）
// ----------------------------------------------------------------
var locBtn = document.createElement("button");
locBtn.className = "area-btn loc-btn";
locBtn.innerHTML = "📍 現在地";
locBtn.onclick = function() {
  if (!navigator.geolocation) {
    alert("お使いのブラウザは位置情報に対応していません。");
    return;
  }
  locBtn.disabled = true;
  locBtn.innerHTML = "取得中…";
  map.locate({
    setView: true,
    maxZoom: 16,
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
};
container.appendChild(locBtn);

// 現在地マーカー＆精度円（再取得時は置き換え）
var locMarker = null;
var locCircle = null;

map.on("locationfound", function(e) {
  if (locMarker) map.removeLayer(locMarker);
  if (locCircle) map.removeLayer(locCircle);

  // パルスする現在地ドット
  var pulseIcon = L.divIcon({
    html: '<div class="loc-pulse"></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    className: ""
  });
  locMarker = L.marker(e.latlng, { icon: pulseIcon, interactive: true })
    .addTo(map)
    .bindPopup("現在地（誤差 約" + Math.round(e.accuracy) + "m）");

  // 精度円
  locCircle = L.circle(e.latlng, {
    radius: e.accuracy,
    color: "#1E88E5",
    weight: 1,
    fillColor: "#1E88E5",
    fillOpacity: 0.08
  }).addTo(map);

  locBtn.disabled = false;
  locBtn.innerHTML = "📍 現在地";
});

map.on("locationerror", function(e) {
  locBtn.disabled = false;
  locBtn.innerHTML = "📍 現在地";
  var msg = "位置情報を取得できませんでした。";
  if (e.code === 1) msg = "位置情報の利用が拒否されています。ブラウザの設定をご確認ください。";
  else if (e.code === 2) msg = "現在地を特定できませんでした。電波状況をご確認ください。";
  else if (e.code === 3) msg = "位置情報の取得がタイムアウトしました。もう一度お試しください。";
  alert(msg);
});

// ----------------------------------------------------------------
// エリア切替ボタン
// ----------------------------------------------------------------
areas.forEach(function(a, i) {
  var btn = document.createElement("button");
  btn.className = "area-btn" + (i === 0 ? " active" : "");
  btn.textContent = a.name;
  btn.onclick = function() {
    document.querySelectorAll(".area-btn").forEach(function(b) {
      if (!b.classList.contains("loc-btn")) b.className = "area-btn";
    });
    btn.className = "area-btn active";
    map.flyTo([a.lat, a.lng], a.zoom, { duration: 0.8 });
    filterMarkers(a.name);
  };
  container.appendChild(btn);
});

function filterMarkers(areaName) {
  allMarkers.forEach(function(m) {
    if (areaName === "全エリア" || m.area === areaName) {
      map.addLayer(m.marker);
      // red は常時ポップアップを開いた状態に戻す
      if (m.color === "red") {
        m.marker.openPopup();
      }
    } else {
      map.removeLayer(m.marker);
    }
  });
}

function addMarker(name, lat, lng, area, color, desc) {
  var c = (color || "black").trim().toLowerCase();
  var marker = L.marker([lat, lng], { icon: makeIcon(c) });

  // red のポップアップは autoClose:false / closeOnClick:false で開きっぱなしを維持
  var popupOpts = (c === "red")
    ? { autoClose: false, closeOnClick: false, autoPan: false, className: "red-popup" }
    : {};

  marker.bindPopup(
    '<div class="spot-popup"><h3>' + name + '</h3><p>' + desc + '</p>'
    + (area ? '<span class="area-tag">' + area + '</span>' : '') + '</div>',
    popupOpts
  );
  marker.addTo(map);

  // red はデフォルトで開いた状態にする
  if (c === "red") {
    marker.openPopup();
  }

  allMarkers.push({ marker: marker, area: area, color: c });
}

Papa.parse(SHEET_URL, {
  download: true, header: true, skipEmptyLines: true,
  complete: function(results) {
    results.data.forEach(function(row) {
      if (row.name && row.lat && row.lng) {
        addMarker(row.name, parseFloat(row.lat), parseFloat(row.lng),
          row.area || "", (row.color || "black").trim().toLowerCase(), row.description || "");
      }
    });
  }
});
</script>
</body>
</html>
